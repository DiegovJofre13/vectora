services:
  - type: web
    name: vectora-server
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w @vectora/probe && npm run build -w @vectora/server
    startCommand: npm run start -w @vectora/server
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: vectora-cliente-demo
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w @vectora/probe
    startCommand: VECTORA_PROBE_PORT=$PORT npm run start -w cliente-demo-fintech
    envVars:
      - key: VECTORA_GATEWAY_URL
        sync: false
      - key: VECTORA_API_KEY
        sync: false
